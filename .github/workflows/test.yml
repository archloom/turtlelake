name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux + Windows because the MCP stdio path has historically
        # broken on Windows due to .exe shim quirks and console encoding.
        # Both must stay green for "embedded local-agent runtime" to mean
        # what it says.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev + mcp + shacl extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp,shacl]"

      - name: Run pytest
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: pytest -x -q
