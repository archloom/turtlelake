name: release

# Builds the package and publishes to PyPI when a `vX.Y.Z` git tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored in the repo.
#
# One-time setup before this works:
#   1. Reserve the `turtlelake` name on https://pypi.org (or test.pypi.org first).
#   2. On PyPI, configure a "Trusted publisher" for this repo:
#        Project: turtlelake
#        Owner:   archloom            (must match GitHub org/user)
#        Repository: turtlelake
#        Workflow: release.yml
#        Environment: pypi            (matches the `environment:` key below)
#   3. (Optional) Repeat with `test.pypi.org` and a `testpypi` environment for
#      dry-run releases.
#
# To cut a release:
#   - Bump `version` in pyproject.toml.
#   - Tag: `git tag v0.0.2 && git push origin v0.0.2`.
#   - This workflow builds the wheel + sdist, uploads to PyPI, and attaches
#     the artifacts to the GitHub Release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags need full history so hatchling can resolve the version.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag version matches pyproject.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject.toml version $pkg"
            exit 1
          fi
          echo "OK: tag $tag matches pyproject.toml $pkg"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/turtlelake/
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` — Trusted Publishing handles auth via OIDC.
          packages-dir: dist/

  github-release:
    name: attach artifacts to GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
